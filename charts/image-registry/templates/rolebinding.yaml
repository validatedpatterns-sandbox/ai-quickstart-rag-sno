apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: imperative-sa-registry-token
  namespace: openshift-image-registry
rules:
  - apiGroups: [""]
    resources: ["serviceaccounts/token"]
    verbs: ["create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: imperative-sa-registry-token
  namespace: openshift-image-registry
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: imperative-sa-registry-token
subjects:
  - kind: ServiceAccount
    name: imperative-sa
    namespace: imperative
